name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Pinned by .tool-versions (Elixir 1.19.5, Erlang/OTP 28.0).
    # `version-type: strict` makes setup-beam use exactly what's in
    # .tool-versions and fail loud if the toolchain can't be installed
    # — this avoids the "mix: command not found" PATH issue we hit
    # when passing a floating `version: "1.18"` to the action.
    # A compat matrix (1.18/27, 1.19/28) was attempted first but
    # proved flaky under setup-beam@v1; the spec called 1.18 compat
    # "optional", so we ship with the pinned toolchain instead.
    name: test (elixir 1.19.5 / otp 28.0)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock', '**/mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo
        run: mix credo --strict

      - name: Run tests
        run: mix test
